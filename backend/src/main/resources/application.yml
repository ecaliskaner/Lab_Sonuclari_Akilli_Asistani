server:
  port: 8080

spring:
  application:
    name: backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lab_assistant}
    username: ${DB_USER:lab_user}
    password: ${DB_PASSWORD:change_me_in_production}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    baseline-on-migrate: true
  jackson:
    time-zone: UTC

logging:
  level:
    root: INFO
    com.lab.assistant: DEBUG
    org.springframework.security: INFO

lab:
  polling:
    interval-ms: 30000
    base-url: ${LAB_MOCK_BASE_URL:http://localhost:8081}
  jwt:
    secret: ${JWT_SECRET:change_me_minimum_32_chars_long_secret_key}
    expiration-ms: 900000 # 15 minutes
    refresh-expiration-ms: 604800000 # 7 days

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:qwen2.5:14b}

management:
  endpoints:
    web:
      base-path: /api/actuator
